<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">The AgentSkein write protocol</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#475569">Every write goes through the same six-step pipeline. Conflicts are detected, never silent.</text>

  <!-- Step 1: Lock -->
  <rect x="60" y="90" width="880" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="120" font-size="14" font-weight="700" fill="#1e3a8a">1.  Acquire distributed lock on the key</text>
  <text x="80" y="138" font-size="11" fill="#374151">Exponential backoff with jitter ($d_i = 0.02 \times 2^i + \mathcal{U}(0, 0.01)$ s, six attempts). No thundering herd.</text>

  <line x1="500" y1="150" x2="500" y2="170" stroke="#374151" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- Step 2: Read existing -->
  <rect x="60" y="170" width="880" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="200" font-size="14" font-weight="700" fill="#1e3a8a">2.  Read the currently stored entry (if any)</text>
  <text x="80" y="218" font-size="11" fill="#374151">Returns MemoryEntry { value, base_value, clock, agent_id, ... } or None for first writes.</text>

  <line x1="500" y1="230" x2="500" y2="250" stroke="#374151" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- Step 3: Vector clock check -->
  <rect x="60" y="250" width="880" height="100" rx="10" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="80" y="278" font-size="14" font-weight="700" fill="#78350f">3.  Compare vector clocks  (the heart of the protocol)</text>
  <text x="80" y="298" font-size="12" fill="#374151" font-family="ui-monospace,Consolas,Menlo,monospace">    new_clock = local_clock.increment(self.agent_id)</text>
  <text x="80" y="316" font-size="12" fill="#374151" font-family="ui-monospace,Consolas,Menlo,monospace">    concurrent = new_clock || existing.clock        # neither dominates → conflict</text>
  <text x="80" y="336" font-size="11" fill="#78350f">Concurrent means: neither $V_{\mathit{new}} \geq V_{\mathit{stored}}$ nor $V_{\mathit{stored}} \geq V_{\mathit{new}}$. Both agents wrote without seeing each other's version.</text>

  <!-- Branching arrows -->
  <line x1="250" y1="350" x2="170" y2="395" stroke="#059669" stroke-width="2" marker-end="url(#ar3)"/>
  <line x1="750" y1="350" x2="830" y2="395" stroke="#dc2626" stroke-width="2" marker-end="url(#ar3)"/>
  <text x="195" y="378" font-size="11" font-weight="700" fill="#059669">causally ordered</text>
  <text x="780" y="378" font-size="11" font-weight="700" fill="#dc2626">concurrent</text>

  <!-- 4a: Safe update branch -->
  <rect x="60" y="400" width="400" height="160" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="80" y="428" font-size="14" font-weight="700" fill="#065f46">4a.  Safe update (no conflict)</text>
  <text x="80" y="450" font-size="11.5" fill="#0f172a" font-family="ui-monospace,Consolas,Menlo,monospace">  entry = MemoryEntry(</text>
  <text x="80" y="466" font-size="11.5" fill="#0f172a" font-family="ui-monospace,Consolas,Menlo,monospace">    value      = new_value,</text>
  <text x="80" y="482" font-size="11.5" fill="#0f172a" font-family="ui-monospace,Consolas,Menlo,monospace">    base_value = existing.value,   # ← for future merges</text>
  <text x="80" y="498" font-size="11.5" fill="#0f172a" font-family="ui-monospace,Consolas,Menlo,monospace">    clock      = new_clock,</text>
  <text x="80" y="514" font-size="11.5" fill="#0f172a" font-family="ui-monospace,Consolas,Menlo,monospace">    agent_id   = self.agent_id,</text>
  <text x="80" y="530" font-size="11.5" fill="#0f172a" font-family="ui-monospace,Consolas,Menlo,monospace">  )</text>
  <text x="80" y="552" font-size="11" fill="#065f46" font-style="italic">Used when one writer read before writing — Git "fast-forward" semantics.</text>

  <!-- 4b: Conflict branch -->
  <rect x="540" y="400" width="400" height="160" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="560" y="428" font-size="14" font-weight="700" fill="#991b1b">4b.  Conflict → resolve per strategy</text>
  <g font-size="11.5" fill="#0f172a" font-family="ui-monospace,Consolas,Menlo,monospace">
    <text x="560" y="450">  resolved = three_way_merge(</text>
    <text x="560" y="466">    base    = existing.base_value,</text>
    <text x="560" y="482">    ours    = new_value,</text>
    <text x="560" y="498">    theirs  = existing.value,</text>
    <text x="560" y="514">  )</text>
    <text x="560" y="530">  # or RAISE / LWW / FWW / SEMANTIC</text>
  </g>
  <text x="560" y="552" font-size="11" fill="#991b1b" font-style="italic">Disjoint keys union losslessly; same-key flat scalars pick a survivor with audit.</text>

  <!-- merging arrows back to step 5 -->
  <line x1="260" y1="560" x2="500" y2="600" stroke="#374151" stroke-width="2" marker-end="url(#ar3)"/>
  <line x1="740" y1="560" x2="500" y2="600" stroke="#374151" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- Step 5: Persist -->
  <rect x="60" y="605" width="880" height="50" rx="10" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="80" y="635" font-size="14" font-weight="700" fill="#78350f">5.  Persist the entry, advance local clock, populate embedding if hook supplied</text>

  <line x1="500" y1="655" x2="500" y2="675" stroke="#374151" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- Step 6: Release lock -->
  <rect x="60" y="675" width="880" height="32" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="500" y="697" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">6.  Release the lock (token-validated CAS in Redis, atomic in InMemory)</text>
</svg>
