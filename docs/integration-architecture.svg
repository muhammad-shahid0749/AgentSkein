<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="lg-app" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="lg-mm" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="lg-store" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d1fae5"/><stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="490" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">How AgentSkein fits into your stack</text>
  <text x="490" y="62" text-anchor="middle" font-size="13" fill="#475569">One Python library, one optional HTTP server, three backends, four framework adapters.</text>

  <!-- App layer -->
  <rect x="40" y="100" width="900" height="110" rx="14" fill="url(#lg-app)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="490" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Your agent framework  (pick any — they all work)</text>
  <g font-size="12" fill="#1e3a8a" text-anchor="middle">
    <rect x="80"  y="145" width="130" height="48" rx="8" fill="#fff" stroke="#3b82f6"/>
    <text x="145" y="174">LangGraph</text>
    <rect x="230" y="145" width="130" height="48" rx="8" fill="#fff" stroke="#3b82f6"/>
    <text x="295" y="174">CrewAI</text>
    <rect x="380" y="145" width="130" height="48" rx="8" fill="#fff" stroke="#3b82f6"/>
    <text x="445" y="174">AutoGen</text>
    <rect x="530" y="145" width="130" height="48" rx="8" fill="#fff" stroke="#3b82f6"/>
    <text x="595" y="174">n8n / Make / Zapier</text>
    <rect x="680" y="145" width="130" height="48" rx="8" fill="#fff" stroke="#3b82f6"/>
    <text x="745" y="174">Raw HTTP / Python</text>
    <rect x="830" y="145" width="110" height="48" rx="8" fill="#fff" stroke="#3b82f6"/>
    <text x="885" y="174">Your loop</text>
  </g>

  <!-- arrows down -->
  <g stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="145" y1="208" x2="280" y2="270"/>
    <line x1="295" y1="208" x2="380" y2="270"/>
    <line x1="445" y1="208" x2="490" y2="270"/>
    <line x1="595" y1="208" x2="600" y2="270"/>
    <line x1="745" y1="208" x2="700" y2="270"/>
    <line x1="885" y1="208" x2="800" y2="270"/>
  </g>

  <!-- AgentSkein layer -->
  <rect x="160" y="270" width="660" height="200" rx="14" fill="url(#lg-mm)" stroke="#d97706" stroke-width="1.5"/>
  <text x="490" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">AgentSkein layer</text>
  <text x="490" y="313" text-anchor="middle" font-size="11" fill="#78350f">Two access modes — pick one per process</text>

  <rect x="190" y="328" width="290" height="62" rx="8" fill="#fff" stroke="#d97706"/>
  <text x="335" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">In-process import</text>
  <text x="335" y="370" text-anchor="middle" font-size="11" fill="#374151">from agentskein import AgentSkein</text>
  <text x="335" y="384" text-anchor="middle" font-size="11" fill="#374151">await mesh.write(...) / mesh.fork(...) / mesh.merge_to(...)</text>

  <rect x="500" y="328" width="290" height="62" rx="8" fill="#fff" stroke="#d97706"/>
  <text x="645" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">HTTP API server</text>
  <text x="645" y="370" text-anchor="middle" font-size="11" fill="#374151">python examples/n8n_api_server/server.py</text>
  <text x="645" y="384" text-anchor="middle" font-size="11" fill="#374151">POST /namespace/{ns}/write/{key}  (FastAPI on :8765)</text>

  <text x="490" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Under both modes you get:</text>
  <text x="490" y="434" text-anchor="middle" font-size="11" fill="#374151">vector-clock conflict detection · 3-way JSON merge · O(1) lazy CoW branching</text>
  <text x="490" y="450" text-anchor="middle" font-size="11" fill="#374151">poisoning detection · per-write attribution · five resolution strategies</text>

  <!-- arrows down to storage -->
  <g stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="335" y1="470" x2="280" y2="525"/>
    <line x1="490" y1="470" x2="490" y2="525"/>
    <line x1="645" y1="470" x2="700" y2="525"/>
  </g>

  <!-- Storage layer -->
  <rect x="160" y="525" width="660" height="90" rx="14" fill="url(#lg-store)" stroke="#059669" stroke-width="1.5"/>
  <text x="490" y="548" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">Storage backend  (one line to swap)</text>
  <g font-size="12" fill="#064e3b" text-anchor="middle">
    <rect x="190" y="566" width="180" height="38" rx="8" fill="#fff" stroke="#059669"/>
    <text x="280" y="590">Redis  (production)</text>
    <rect x="400" y="566" width="180" height="38" rx="8" fill="#fff" stroke="#059669"/>
    <text x="490" y="590">SQLite  (offline)</text>
    <rect x="610" y="566" width="180" height="38" rx="8" fill="#fff" stroke="#059669"/>
    <text x="700" y="590">InMemory  (tests)</text>
  </g>
</svg>
