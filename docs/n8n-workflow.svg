<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Using AgentSkein from n8n (or any HTTP-capable tool)</text>
  <text x="500" y="56" text-anchor="middle" font-size="13" fill="#475569">Three n8n HTTP Request nodes wrap a shared AgentSkein namespace — every write is conflict-safe.</text>

  <!-- Step 1: HTTP server -->
  <rect x="40" y="90" width="920" height="80" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="60" y="118" font-size="13" font-weight="700" fill="#78350f">1.  Boot the AgentSkein HTTP server (one process, any machine reachable by n8n)</text>
  <text x="60" y="140" font-size="12" fill="#374151" font-family="ui-monospace,Consolas,Menlo,monospace">$ python examples/n8n_api_server/server.py</text>
  <text x="60" y="158" font-size="12" fill="#374151" font-family="ui-monospace,Consolas,Menlo,monospace">→ Uvicorn running on http://0.0.0.0:8765   (Swagger UI at /docs)</text>

  <!-- n8n workflow -->
  <rect x="40" y="195" width="920" height="370" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="223" font-size="13" font-weight="700" fill="#1e3a8a">2.  Build the n8n workflow — three HTTP Request nodes hit the API</text>

  <!-- Trigger -->
  <rect x="80" y="255" width="140" height="68" rx="10" fill="#fff" stroke="#3b82f6"/>
  <text x="150" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Trigger</text>
  <text x="150" y="298" text-anchor="middle" font-size="11" fill="#475569">Webhook / Cron /</text>
  <text x="150" y="312" text-anchor="middle" font-size="11" fill="#475569">Email-arrives</text>

  <line x1="220" y1="289" x2="262" y2="289" stroke="#374151" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Init namespace -->
  <rect x="265" y="255" width="180" height="68" rx="10" fill="#fff" stroke="#3b82f6"/>
  <text x="355" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">HTTP node #1: init</text>
  <text x="355" y="295" text-anchor="middle" font-size="11" fill="#374151" font-family="ui-monospace,Consolas,Menlo,monospace">POST /namespace/{ns}/init</text>
  <text x="355" y="312" text-anchor="middle" font-size="10" fill="#475569">creates namespace if needed</text>

  <line x1="445" y1="289" x2="487" y2="289" stroke="#374151" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Write -->
  <rect x="490" y="255" width="220" height="68" rx="10" fill="#fff" stroke="#3b82f6"/>
  <text x="600" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">HTTP node #2: write</text>
  <text x="600" y="295" text-anchor="middle" font-size="11" fill="#374151" font-family="ui-monospace,Consolas,Menlo,monospace">POST /namespace/{ns}/write/{key}</text>
  <text x="600" y="312" text-anchor="middle" font-size="10" fill="#475569">body: agent_id, value, strategy</text>

  <line x1="710" y1="289" x2="752" y2="289" stroke="#374151" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Read -->
  <rect x="755" y="255" width="180" height="68" rx="10" fill="#fff" stroke="#3b82f6"/>
  <text x="845" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">HTTP node #3: read</text>
  <text x="845" y="295" text-anchor="middle" font-size="11" fill="#374151" font-family="ui-monospace,Consolas,Menlo,monospace">GET /namespace/{ns}/snapshot</text>
  <text x="845" y="312" text-anchor="middle" font-size="10" fill="#475569">→ structured response</text>

  <!-- Down arrow to body -->
  <line x1="600" y1="323" x2="600" y2="370" stroke="#374151" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Sample request body -->
  <rect x="200" y="375" width="600" height="170" rx="10" fill="#fff" stroke="#3b82f6"/>
  <text x="500" y="398" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">HTTP node #2 — JSON body</text>
  <g font-family="ui-monospace,Consolas,Menlo,monospace" font-size="11.5" fill="#0f172a">
    <text x="220" y="421">{</text>
    <text x="240" y="438">"agent_id":           "n8n-flow-7",</text>
    <text x="240" y="455">"value":              { "title": "ARM holdings IPO", "$2B": 1 },</text>
    <text x="240" y="472">"branch":             "main",</text>
    <text x="240" y="489">"conflict_strategy":  "merge_structural"     ← pick from 5 options</text>
    <text x="220" y="506">}</text>
  </g>
  <text x="500" y="530" text-anchor="middle" font-size="11" fill="#475569">Response: 200 OK with `conflict_detected`, `conflict_resolved_by`, `entry_id`, etc.</text>
</svg>
